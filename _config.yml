# Jekyll — GitHub Pages (https://pages.github.com/)
# После включения Pages: Settings → Pages → Source: Deploy from branch (main) / (root)

title: "Tour de Bory 2026"
description: "План велотуринга со статичным лагерем — Bory Tucholskie, 1–5 мая 2026"
author: beetzung

# Репозиторий проекта → сайт: https://beetzung.github.io/tour_de_bory_2026/
url: "https://beetzung.github.io"
baseurl: "/tour_de_bory_2026"

repository: "beetzung/tour_de_bory_2026"

# README с YAML ломает индекс по умолчанию; с front matter — выставляем permalink /
# см. https://github.com/benbalter/jekyll-readme-index
readme_index:
  with_frontmatter: true

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Поддерживаемая GitHub Pages тема: https://pages.github.com/themes/
theme: minima

minima:
  skin: classic

# Разрешённые на GitHub Pages плагины — см. https://github.com/github/pages-gem
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-relative-links
  # README.md → index.html; .md в корне без --- тоже обрабатываются
  - jekyll-readme-index
  - jekyll-optional-front-matter
  - jekyll-default-layout

# Макет по умолчанию для страниц из Markdown (работает с jekyll-default-layout)
# Permalinks: используем читаемое имя страницы (из заголовка), а не имя файла.
# jekyll-relative-links автоматически подставит эти пути в ссылках вида [x](foo.md).
defaults:
  - scope:
      path: ""
    values:
      layout: "page"
  - scope:
      path: "README.md"
    values:
      title: "Tour de Bory — велотуринг со статичным лагерем"
  - scope:
      path: "members.md"
    values:
      permalink: "/участники/"
  - scope:
      path: "schedule.md"
    values:
      permalink: "/расписание/"
  - scope:
      path: "menu.md"
    values:
      permalink: "/меню/"
  - scope:
      path: "shopping-grocery.md"
    values:
      permalink: "/список-покупок-в-магазине/"
  - scope:
      path: "shopping-online.md"
    values:
      permalink: "/заказы-онлайн/"
  - scope:
      path: "expenses.md"
    values:
      permalink: "/общая-касса/"
  - scope:
      path: "gear-camp.md"
    values:
      permalink: "/лагерное-имущество/"
  - scope:
      path: "gear-personal.md"
    values:
      permalink: "/личный-чеклист/"
  - scope:
      path: "todo.md"
    values:
      permalink: "/to-do/"
  - scope:
      path: "logistics.md"
    values:
      permalink: "/логистика/"
  - scope:
      path: "schrodingers.md"
    values:
      permalink: "/шрёдингеры/"
  - scope:
      path: "hardcoded_diff.md"
    values:
      permalink: "/отличия-сводки/"
  - scope:
      path: "pending_updates.md"
    values:
      permalink: "/ожидающие-правки/"

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - .sass-cache
  - .jekyll-cache
